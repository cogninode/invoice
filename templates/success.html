<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Invoice Sent — CogniNode</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", system-ui, sans-serif;
      background: #f0f4f8;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    /* ── Confetti canvas ────────────────────────────── */
    #confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* ── Subtle background ─────────────────────────── */
    .bg-pattern {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      background-image:
        radial-gradient(circle at 30% 20%, rgba(37,99,235,.06) 0%, transparent 50%),
        radial-gradient(circle at 70% 80%, rgba(22,163,74,.04) 0%, transparent 50%);
    }

    .card {
      position: relative;
      z-index: 2;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      padding: 52px 44px 44px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,.08), 0 8px 20px rgba(0,0,0,.04);
      animation: cardIn .6s cubic-bezier(.4,0,.2,1);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Animated check ────────────────────────────── */
    .check {
      width: 84px; height: 84px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #16a34a, #059669);
      display: grid;
      place-items: center;
      box-shadow: 0 0 0 12px rgba(22,163,74,.08), 0 6px 24px rgba(22,163,74,.2);
      animation: checkPop .5s cubic-bezier(.68,-.55,.27,1.55) .2s both;
    }
    @keyframes checkPop {
      from { transform: scale(0); }
      to { transform: scale(1); }
    }
    .check svg path {
      stroke-dasharray: 50;
      stroke-dashoffset: 50;
      animation: drawPath .5s ease .5s forwards;
    }
    @keyframes drawPath {
      to { stroke-dashoffset: 0; }
    }

    h1 {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -.5px;
      color: #0f172a;
      margin-bottom: 8px;
      animation: fadeInUp .5s ease .3s both;
    }
    .sub {
      font-size: 14px;
      color: #475569;
      margin-bottom: 28px;
      line-height: 1.6;
      animation: fadeInUp .5s ease .4s both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Invoice badge ──────────────────────────────── */
    .badge {
      display: inline-block;
      background: rgba(37,99,235,.05);
      border: 1px solid rgba(37,99,235,.15);
      border-radius: 14px;
      padding: 18px 32px;
      margin-bottom: 28px;
      animation: fadeInUp .5s ease .5s both;
    }
    .badge .lbl {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #2563eb;
      margin-bottom: 6px;
    }
    .badge .num {
      font-size: 24px;
      font-weight: 800;
      color: #0f172a;
      letter-spacing: 1.5px;
      font-variant-numeric: tabular-nums;
    }

    /* ── Buttons ───────────────────────────────────── */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: fadeInUp .5s ease .6s both;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 13px 24px;
      text-decoration: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .2px;
      transition: all .2s cubic-bezier(.4,0,.2,1);
      border: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,.18) 50%, transparent 60%);
      transform: translateX(-100%);
      transition: transform .5s;
    }
    .btn:hover::before { transform: translateX(100%); }

    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #4f46e5);
      color: #fff;
      box-shadow: 0 4px 16px rgba(37,99,235,.25);
    }
    .btn-primary:hover { box-shadow: 0 8px 28px rgba(37,99,235,.35); transform: translateY(-1px); }

    .btn-secondary {
      background: #f7f9fb;
      border: 1px solid #e2e8f0;
      color: #475569;
    }
    .btn-secondary:hover { background: #eef2f7; transform: translateY(-1px); }

    .note {
      margin-top: 20px;
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.6;
      animation: fadeInUp .5s ease .7s both;
    }

    @media (max-width: 480px) {
      body { padding: 16px; }
      .card { padding: 32px 18px 28px; border-radius: 18px; }
      h1 { font-size: 21px; }
      .sub { font-size: 13px; margin-bottom: 22px; }
      .check { width: 68px; height: 68px; margin-bottom: 20px; }
      .check svg { width: 30px; height: 30px; }
      .badge { padding: 14px 24px; border-radius: 12px; margin-bottom: 22px; }
      .badge .num { font-size: 19px; letter-spacing: 1px; }
      .badge .lbl { font-size: 9px; }
      .btn { padding: 14px 20px; font-size: 13px; border-radius: 10px; }
      .note { font-size: 11px; margin-top: 16px; }
    }
  </style>
</head>
<body>

<canvas id="confetti"></canvas>
<div class="bg-pattern"></div>

<div class="card">
  <div class="check">
    <svg width="38" height="38" fill="none" viewBox="0 0 38 38">
      <path d="M9 19.5l7.5 7.5 13-15"
            stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <h1>Invoice Sent!</h1>
  <p class="sub">Your invoice has been generated, emailed, and is ready for download.</p>

  <div class="badge">
    <div class="lbl">Invoice Number</div>
    <div class="num">{{ invoice_no }}</div>
  </div>

  <div class="actions">
    <a href="/download/{{ invoice_no }}" download class="btn btn-primary">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 2v9M4 8l4 4 4-4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 13h12" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Download PDF
    </a>

    <a href="/" class="btn btn-secondary">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
      Create Another Invoice
    </a>
  </div>

  <p class="note">A copy has been sent to CogniNode and to the client (if email was provided).</p>
</div>

<script>
  /* ── Confetti Animation ──────────────────────────── */
  (() => {
    const canvas = document.getElementById("confetti");
    const ctx = canvas.getContext("2d");
    let W, H;
    const colors = ["#2563eb","#4f46e5","#16a34a","#ea580c","#dc2626","#7c3aed","#db2777","#0891b2"];
    const particles = [];
    const COUNT = 100;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener("resize", resize);

    class Particle {
      constructor() {
        this.x = Math.random() * W;
        this.y = Math.random() * H * -1;
        this.w = 4 + Math.random() * 5;
        this.h = 3 + Math.random() * 4;
        this.vy = 2 + Math.random() * 3.5;
        this.vx = (Math.random() - 0.5) * 2.5;
        this.rot = Math.random() * 360;
        this.rotSpeed = (Math.random() - 0.5) * 8;
        this.color = colors[Math.floor(Math.random() * colors.length)];
        this.opacity = 1;
        this.decay = 0.004 + Math.random() * 0.004;
      }
      update() {
        this.y += this.vy;
        this.x += this.vx;
        this.rot += this.rotSpeed;
        this.opacity -= this.decay;
        this.vy += 0.03;
      }
      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate((this.rot * Math.PI) / 180);
        ctx.globalAlpha = Math.max(0, this.opacity);
        ctx.fillStyle = this.color;
        ctx.fillRect(-this.w / 2, -this.h / 2, this.w, this.h);
        ctx.restore();
      }
    }

    for (let i = 0; i < COUNT; i++) particles.push(new Particle());

    function animate() {
      ctx.clearRect(0, 0, W, H);
      let alive = false;
      particles.forEach(p => {
        p.update();
        if (p.opacity > 0) { p.draw(); alive = true; }
      });
      if (alive) requestAnimationFrame(animate);
    }
    animate();
  })();
</script>
</body>
</html>
